<div class="p-6">

    <h2 class="text-2xl font-semibold">Cameras</h2>

    <button mat-flat-button color="primary" (click)="openCreate()">Add camera</button>

  <app-camera-table [cameras]="cameras" (editCamera)="edit($event)" (deleteCamera)="remove($event)">

</div>
