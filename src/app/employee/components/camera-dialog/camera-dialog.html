<h2 mat-dialog-title class="text-xl font-semibold text-slate-900 !mb-4">
  {{ data ? 'Edit Camera' : 'Add Camera' }}
</h2>

<mat-dialog-content class="!p-0">
  <form [formGroup]="form" class="flex flex-col gap-4 px-6 py-4">
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Brand & Model</mat-label>

      <mat-select formControlName="cameraModelId">
        <mat-option *ngFor="let model of cameraModels" [value]="model.id">
          {{ model.brand }} {{ model.model }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <div class="grid grid-cols-2 gap-4">
      <mat-form-field appearance="outline">
        <mat-label>Price per day</mat-label>
        <input matInput type="number" formControlName="pricePerDay" />
        <span matTextSuffix>€</span>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Year</mat-label>
        <input matInput type="number" formControlName="year" />
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>Condition</mat-label>
      <input matInput type="string" formControlName="cameraCondition" />
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions class="!px-6 !py-4 !mt-4 flex justify-end gap-3">
  <button mat-stroked-button type="button" (click)="close()">Cancel</button>

  <button mat-flat-button color="primary" type="button" (click)="save()" [disabled]="form.invalid">
    {{ data ? 'Save changes' : 'Create camera' }}
  </button>
</mat-dialog-actions>
