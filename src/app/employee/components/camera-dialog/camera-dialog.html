<h2 mat-dialog-title class="text-xl font-semibold text-slate-900 !mb-4">
  {{ data ? 'Edit Camera' : 'Add Camera' }}
</h2>

<mat-dialog-content class="!p-0">
  <form [formGroup]="form" class="flex flex-col gap-4 px-6">
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status">
        <mat-option value="AVAILABLE">Available</mat-option>
        <mat-option value="RENTED">Rented</mat-option>
        <mat-option value="DAMAGED">Damaged</mat-option>
      </mat-select>
    </mat-form-field>

    <div class="grid grid-cols-2 gap-4">
      <mat-form-field appearance="outline">
        <mat-label>Price per day</mat-label>
        <input matInput type="number" formControlName="pricePerDay" />
        <span matTextSuffix>€</span>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Year</mat-label>
        <input matInput type="number" formControlName="year" />
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Condition</mat-label>
      <mat-select formControlName="cameraCondition">
        <mat-option value="GOOD">Good</mat-option>
        <mat-option value="BAD">Bad</mat-option>
        <mat-option value="DAMAGED">Damaged</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Camera model ID</mat-label>
      <input matInput type="number" formControlName="cameraModelId" />
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions class="!px-6 !py-4 !mt-4 flex justify-end gap-3">
  <button mat-stroked-button type="button" (click)="close()">Cancel</button>

  <button mat-flat-button color="primary" type="button" (click)="save()" [disabled]="form.invalid">
    {{ data ? 'Save changes' : 'Create camera' }}
  </button>
</mat-dialog-actions>
