<div class="rounded-xl border border-slate-200 bg-white shadow-sm overflow-hidden">
  <table mat-table [dataSource]="dataSource">
    <!-- Camera -->

    <ng-container matColumnDef="camera">
      <th mat-header-cell *matHeaderCellDef class="text-slate-600 font-semibold">Camera</th>

      <td mat-cell *matCellDef="let camera" class="py-3">
        <span class="font-medium text-slate-800">
          {{ camera.cameraModel.brand }}
        </span>

        <span class="text-slate-500 ml-1">
          {{ camera.cameraModel.model }}
        </span>
      </td>
    </ng-container>

    <!-- Condition -->

    <ng-container matColumnDef="condition">
      <th mat-header-cell *matHeaderCellDef class="text-slate-600 font-semibold">Condition</th>

      <td mat-cell *matCellDef="let camera" class="py-3 text-slate-700">
        {{ camera.cameraCondition }}
      </td>
    </ng-container>

    <!-- Price -->

    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef class="text-slate-600 font-semibold">Price/day</th>

      <td mat-cell *matCellDef="let camera" class="py-3">{{ camera.pricePerDay }} €</td>
    </ng-container>

    <!-- Year -->

    <ng-container matColumnDef="year">
      <th mat-header-cell *matHeaderCellDef class="text-slate-600 font-semibold">Year</th>

      <td mat-cell *matCellDef="let camera" class="py-3">
        {{ camera.year }}
      </td>
    </ng-container>

    <!-- Actions -->

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="text-slate-600 font-semibold text-right">
        Actions
      </th>

      <td mat-cell *matCellDef="let camera" class="py-3 text-right space-x-2">
        <button mat-stroked-button [style.color]="'#8B5E3C'" (click)="editCamera.emit(camera)">Edit</button>

        <button mat-stroked-button color="warn" (click)="deleteCamera.emit(camera.id)">
          Delete
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"
      class="hover:bg-slate-50 transition"
    ></tr>
  </table>
  <mat-paginator [pageSize]="5" [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
</div>
