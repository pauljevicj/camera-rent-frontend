<mat-card class="overflow-hidden rounded-3xl border border-slate-200 shadow-sm">
  <div class="border-b border-slate-200 bg-white/90 px-6 py-5">
    <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <h2 class="text-xl font-semibold text-slate-900">Available cameras</h2>
      </div>
      <div class="flex items-center gap-2 text-sm text-slate-500">
        {{ cameras.length }} items
      </div>
    </div>
  </div>

  <div *ngIf="isLoading" class="flex min-h-[280px] items-center justify-center">
    <mat-progress-spinner mode="indeterminate" diameter="42"></mat-progress-spinner>
  </div>

  <div *ngIf="!isLoading && cameras.length === 0" class="p-10 text-center">
    <h3 class="text-lg font-semibold text-slate-800">No cameras available right now</h3>
    <p class="mt-2 text-slate-600">Please check back later for new gear.</p>
  </div>

  <div *ngIf="!isLoading && cameras.length > 0" class="overflow-x-auto">
    <table mat-table [dataSource]="dataSource" matSort class="w-full min-w-[780px]">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
        <td mat-cell *matCellDef="let camera">
          <div class="flex flex-col">
            <span class="text-sm ">{{ camera.brand }}</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="brand">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Model</th>
        <td mat-cell *matCellDef="let camera">{{ camera.model }}</td>
      </ng-container>

      <ng-container matColumnDef="condition">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Condition</th>
        <td mat-cell *matCellDef="let camera">{{ camera.condition || 'Unknown' }}</td>
      </ng-container>

      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Price</th>
        <td mat-cell *matCellDef="let camera">€{{ camera.pricePerDay }}/day</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let camera">
          <button mat-flat-button style="background-color: #8B5E3C; color: white;" (click)="reserve(camera)">Reserve</button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <mat-paginator [pageSize]="5" [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
  </div>
</mat-card>
