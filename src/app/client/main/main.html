<app-navbar></app-navbar>

<section class="min-h-screen bg-slate-50 px-4 py-6 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-7xl">
    <div class="mb-6 flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
      <div>
        <p class="text-sm font-semibold uppercase tracking-[0.2em] text-sky-600">Camera catalog</p>
        <h1 class="text-3xl font-semibold text-slate-900">Camera inventory</h1>
        <p class="mt-2 max-w-2xl text-slate-600">
          Browse the available cameras and reserve the gear that fits your next production.
        </p>
      </div>
    </div>

    <section class="min-h-screen bg-slate-50 px-4 py-6 sm:px-6 lg:px-8">
      <div class="mx-auto max-w-7xl">
        <app-camera-filters (valueSearch)="onSearch($event)"> </app-camera-filters>

        <app-camera-table [cameras]="cameras" [isLoading]="isLoading"> </app-camera-table>
      </div>
    </section>
  </div>
</section>
